name: CI

on:
  push:  
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu_lastest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4
      - name: Intaller Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Installer les dépendances
        run : npm install
      - name : Lancer les tests
        run : npm test
      - name : Construire le projet
        run : npm run build
